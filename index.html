<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hybrid Racing Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
        }

        .page {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #00ff00;
        }

        p, li {
            font-size: 1.1em;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            padding: 10px;
            background: #2a2a2a;
            margin-bottom: 10px;
            border-left: 4px solid #00ff00;
        }

        nav {
            display: flex;
            gap: 10px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #00ff00;
        }

        a {
            padding: 10px 20px;
            background: #00ff00;
            color: #000;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.2s;
        }

        a:hover {
            background: #00cc00;
        }
    </style>
</head>
<body>
    <div id="main">
    </div>
</body>
</html>
